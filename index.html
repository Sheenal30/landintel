<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandIntel - Jaipur Land Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="hero">
        <h1>LandIntel</h1>
        <p class="tagline">Data Pipeline: Python Scraper → JSON → Map</p>
        <div class="contact-badge">Showing Data from: <span id="lastUpdated">Loading...</span></div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="panel-box">
                <label>📍 Filter Listings</label>
                <select id="priceFilter">
                    <option value="all">All Properties</option>
                    <option value="under100">Under ₹1 Crore</option>
                    <option value="over100">₹1 Crore & Above</option>
                </select>
            </div>
            <p class="demo-note">Click a listing to view the Real AI Report extracted from the Python backend.</p>
        </div>
        <div id="map"></div>
    </div>

    <!-- AI Modal -->
    <div class="modal-overlay" id="aiModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🧠 AI Land Intelligence Report</h2>
                <button class="close-btn" id="closeModalBtn">×</button>
            </div>
            <div class="modal-body" id="modalBodyContent"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 'defer' ensures the HTML loads BEFORE the JavaScript runs, fixing your blank screen -->
    <script src="app.js" defer></script>
</body>
</html>
