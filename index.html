<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LandIntel - High Density Mapping</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; overflow-x: hidden; }

        .hero { background: #2c3e50; color: white; padding: 15px; text-align: center; border-bottom: 4px solid #3498db; }
        .hero h1 { margin: 0; font-size: 24px; color: #ecf0f1; }
        .hero p.tagline { font-size: 13px; color: #3498db; margin: 4px 0; font-weight: bold; }
        .contact-badge { display: inline-block; background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid #34495e; }

        .app-container { display: flex; flex-direction: row; height: calc(100vh - 100px); min-height: 500px; width: 100%; }

        .sidebar { width: 320px; background: #fff; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1000; overflow-y: auto; }
        .panel-box { margin-bottom: 15px; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e9ecef; }
        .panel-box label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #2c3e50; }
        .panel-box select { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }
        .demo-note { font-size: 12px; color: #7f8c8d; background: #e8f4f8; padding: 8px; border-radius: 6px; border-left: 3px solid #3498db; }

        #map { flex-grow: 1; height: 100%; width: 100%; min-height: 500px; z-index: 1; background: #e5e3df; }

        .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; color: #2980b9; }
        .popup-detail { margin: 3px 0; font-size: 12px; line-height: 1.4; }
        .btn-primary { display: block; width: 100%; background: #2c3e50; color: white; padding: 8px 0; margin-top: 10px; border-radius: 4px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 600px; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-height: 90vh; display: flex; flex-direction: column;}
        .modal-header { background: #2c3e50; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #3498db;}
        .modal-header h2 { margin: 0; font-size: 16px; }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; line-height: 1;}
        .modal-body { padding: 15px; overflow-y: auto; font-size: 13px; line-height: 1.6; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; height: auto; }
            .sidebar { width: 100%; max-height: 250px; padding: 10px; }
            #map { height: 60vh; min-height: 400px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>LandIntel - High Density Infra Map</h1>
        <p class="tagline">Focus: Tonk Rd, Ajmer Rd, SEZ & Outer Ring Road</p>
        <div class="contact-badge">Updated: <span id="lastUpdated">...</span></div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="panel-box">
                <label>📍 Legend</label>
                <div style="font-size: 12px; color: #555;">
                    <p><span style="color:#e67e22;">●</span> Road / Interchange</p>
                    <p><span style="color:#9b59b6;">●</span> Metro Station / Line</p>
                    <p><span style="color:#2ecc71;">●</span> Township / SEZ</p>
                    <p><span style="color:#3498db;">●</span> Utility / Flagship</p>
                    <p>⭐ Locality Health</p>
                </div>
            </div>
            <div class="panel-box">
                <label>💰 Price Filter</label>
                <select id="priceFilter">
                    <option value="all">All Budgets</option>
                    <option value="under50">Under ₹50 Lakh</option>
                    <option value="50-100">₹50 Lakh - ₹1 Cr</option>
                    <option value="over100">Over ₹1 Cr</option>
                </select>
            </div>
            <p class="demo-note">Zoom out to see the <b>Outer Ring Road</b> border projects.</p>
        </div>
        <div id="map"></div>
    </div>

    <div class="modal-overlay" id="aiModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalHeaderTitle">🧠 Intelligence Report</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBodyContent"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const map = L.map('map').setView([26.75, 75.75], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; LandIntel Jaipur High-Density'
            }).addTo(map);

            const localityLayer = L.layerGroup().addTo(map);
            const infraLayer = L.layerGroup().addTo(map);
            const listingLayer = L.layerGroup().addTo(map);

            L.control.layers(null, {
                "⭐ Locality Health": localityLayer,
                "🏗️ Infrastructure Points": infraLayer,
                "📍 Land Listings": listingLayer
            }, { collapsed: false }).addTo(map);

            let globalListings = [];

            fetch('data.json')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('lastUpdated').innerText = data.last_updated;
                    globalListings = data.listings;

                    // Render Localities
                    data.localities.forEach(loc => {
                        const starMarker = L.marker([loc.lat, loc.lng], {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: "<div style='background:rgba(255,255,255,0.9); border:2px solid #f1c40f; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 2px 5px rgba(0,0,0,0.2);'>⭐</div>",
                                iconSize: [30, 30],
                                iconAnchor: [15, 15]
                            })
                        });
                        starMarker.bindPopup(`
                            <div class="popup-title" style="color:#f39c12;">⭐ Locality: ${loc.name}</div>
                            <div class="popup-detail"><strong>Infra:</strong> ${loc.infra_score} | <strong>Civilization:</strong> ${loc.civilization_score}</div>
                            <div class="popup-detail" style="background:#f9f9f9; padding:8px; border-radius:4px; font-style:italic; margin-top:5px;">
                                "${loc.brutal_truth}"
                            </div>
                        `, { maxWidth: 250 });
                        localityLayer.addLayer(starMarker);
                    });

                    // Render Infrastructure
                    data.infrastructure.forEach(item => {
                        let color = '#3498db'; // Utility
                        if (item.type.includes('Road')) color = '#e67e22';
                        if (item.type.includes('Metro')) color = '#9b59b6';
                        if (item.type.includes('Township') || item.type.includes('SEZ')) color = '#2ecc71';

                        const marker = L.circleMarker([item.lat, item.lng], {
                            color: color,
                            fillColor: color,
                            fillOpacity: 0.7,
                            radius: 7,
                            weight: 2
                        });
                        marker.bindPopup(`
                            <div class="popup-title" style="color:${color};">🏗️ ${item.name}</div>
                            <div class="popup-detail"><strong>Type:</strong> ${item.type}</div>
                            <div class="popup-detail"><strong>Status:</strong> ${item.status}</div>
                            <div class="popup-detail" style="margin-top:5px; border-top:1px solid #eee; padding-top:5px;">
                                ${item.desc}
                            </div>
                        `, { maxWidth: 250 });
                        infraLayer.addLayer(marker);
                    });

                    renderListings();
                });

            function renderListings() {
                listingLayer.clearLayers();
                const filter = document.getElementById('priceFilter').value;

                globalListings.forEach((item, index) => {
                    const price = item.price;
                    if (filter === 'under50' && price >= 50) return;
                    if (filter === '50-100' && (price < 50 || price > 100)) return;
                    if (filter === 'over100' && price <= 100) return;

                    const marker = L.marker([item.lat, item.lng]);
                    marker.bindPopup(`
                        <div class="popup-title">📍 ${item.title}</div>
                        <div class="popup-detail"><strong>Price:</strong> ${item.priceTxt}</div>
                        <button class="btn-primary" onclick="openListingReport(${index})">View Analysis</button>
                    `);
                    listingLayer.addLayer(marker);
                });
            }

            window.openListingReport = function(index) {
                const ai = globalListings[index].ai_report;
                const html = `
                    <div style="background: #1e272e; color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px;">
                        <h3 style="margin: 0 0 5px 0; font-size: 13px; color: #0fb9b1; text-transform: uppercase;">Verdict</h3>
                        <p style="margin: 0; font-size: 14px;">${ai.recommendation}</p>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <h3 style="font-size: 14px; margin: 0 0 5px 0; color: #2c3e50; border-bottom: 1px solid #dfe4ea;">🏗️ Infrastructure Impact</h3>
                        <p style="margin: 0;">${ai.infra}</p>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <h3 style="font-size: 14px; margin: 0 0 5px 0; color: #2c3e50; border-bottom: 1px solid #dfe4ea;">🌍 Civilization & Utilities</h3>
                        <p style="margin: 0;">${ai.civilization}</p>
                    </div>
                `;
                document.getElementById('modalBodyContent').innerHTML = html;
                document.getElementById('aiModal').style.display = 'flex';
            };

            document.getElementById('closeModalBtn').onclick = () => document.getElementById('aiModal').style.display = 'none';
            document.getElementById('priceFilter').onchange = renderListings;
        });
    </script>
</body>
</html>
